site_name: Sieve
site_description: Transparent context reduction for LLMs.
site_url: https://llmsieve.dev
repo_url: https://github.com/llmsieve/llm-sieve
repo_name: llmsieve/llm-sieve
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/sieve-icon.svg
  favicon: assets/sieve-icon-favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Installation: installation.md
  - Configuration: configuration.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/llmsieve/llm-sieve
      name: Sieve on GitHub
  generator: false

copyright: Copyright &copy; 2026 Sieve contributors. Licensed under Apache 2.0. Patent pending GB2608859.1.
